version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: streetvoice_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - streetvoice_network

  redis:
    image: redis:alpine
    container_name: streetvoice_redis
    ports:
      - "6379:6379"
    networks:
      - streetvoice_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: streetvoice_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/streetvoice
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - streetvoice_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: streetvoice_client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - streetvoice_network

volumes:
  mongo_data:

networks:
  streetvoice_network:
    driver: bridge
